# SIN-62242 / ADR 0079 §2 — Unbound sidecar for the Caddy reverse proxy.
#
# This Unbound is the ONLY recursive resolver Caddy talks to during ACME
# HTTP-01 (and DNS-01) challenges. Its job is to refuse to return any
# private/loopback/link-local IP, so an attacker cannot trick Caddy into
# fetching the ACME challenge file from 127.0.0.1 or 169.254.169.254
# (cloud IMDS) — the F44 attack class.
#
# The blocklist mirrors internal/customdomain/validation/blocklist.go
# verbatim. Drift here = security drift; the package + this file MUST
# stay in sync. CI does not lint this (yet); a follow-up issue tracks
# automating the comparison.

server:
    # Bind to the compose-internal interface only. Caddy reaches us via
    # the `unbound` service name; nobody outside the docker network
    # should query us.
    interface: 0.0.0.0
    port: 5353
    do-ip6: yes

    # Conservative defaults appropriate for a single-tenant sidecar.
    num-threads: 1
    msg-cache-size: 16m
    rrset-cache-size: 32m
    cache-min-ttl: 60
    cache-max-ttl: 3600

    # Trust upstream DNSSEC validation (the recursive root chain is the
    # default in Unbound 1.17+). The AD bit is what the miekg adapter
    # surfaces as IPAnswer.VerifiedWithDNSSEC.
    val-permissive-mode: no
    harden-dnssec-stripped: yes
    harden-glue: yes
    harden-referral-path: yes

    # ----- ADR 0079 §1 SSRF allowlist (negative form) -----
    # An IP listed here is REFUSED on the answer wire. We use
    # private-address (drop the answer if any RR matches) and the
    # deny-answer-address option below (refuse the whole reply).
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 127.0.0.0/8
    private-address: 169.254.0.0/16
    private-address: 100.64.0.0/10
    private-address: 0.0.0.0/8
    private-address: 224.0.0.0/4
    private-address: ::1/128
    private-address: fc00::/7
    private-address: fe80::/10

    # deny-answer-address turns the same allowlist into a hard refusal:
    # if a recursion result for ANY name resolves to one of these
    # addresses, drop the answer entirely. This is the F44 mitigation:
    # an authoritative server controlled by the attacker that returns
    # 127.0.0.1 for evil.test sees its reply rewritten to NXDOMAIN before
    # it reaches Caddy.
    deny-answer-address: 10.0.0.0/8
    deny-answer-address: 172.16.0.0/12
    deny-answer-address: 192.168.0.0/16
    deny-answer-address: 127.0.0.0/8
    deny-answer-address: 169.254.0.0/16
    deny-answer-address: 100.64.0.0/10
    deny-answer-address: 0.0.0.0/8
    deny-answer-address: 224.0.0.0/4
    deny-answer-address: ::1/128
    deny-answer-address: fc00::/7
    deny-answer-address: fe80::/10

    # Access control: only the docker compose network may query us.
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: ::1/128 allow
    access-control: fc00::/7 allow
    access-control: fe80::/10 allow
