# Alertmanager routes the RLSMissDetected alert (and any other
# severity=critical channel=alerts alert) to Slack #alerts via a
# webhook URL provided at runtime as $SLACK_ALERTS_WEBHOOK_URL.
# The URL itself is a secret and MUST come from the env_file, not
# from this config — see deploy/compose/.env.example.
#
# In stg the smoke-alert path also includes a small sentinel
# webhook receiver so `make smoke-alert` can poll it for delivery
# confirmation. The sentinel URL is $SMOKE_ALERT_WEBHOOK_PROBE_URL
# — when unset, the smoke-alert target is best-effort and only
# checks alertmanager's own /-/healthy endpoint.

global:
  resolve_timeout: 5m

route:
  receiver: slack-alerts
  group_by: [alertname, channel]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    # The smoke-alert path posts to the in-network sentinel as well
    # as the real Slack channel so CI can verify delivery.
    - matchers:
        - alertname = RLSMissDetected
      receiver: slack-alerts-and-probe

receivers:
  - name: slack-alerts
    slack_configs:
      - api_url_file: /etc/alertmanager/slack-webhook-url
        channel: "#alerts"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: |
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook }}
          {{ end }}

  - name: slack-alerts-and-probe
    slack_configs:
      - api_url_file: /etc/alertmanager/slack-webhook-url
        channel: "#alerts"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: |
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
    webhook_configs:
      - url_file: /etc/alertmanager/probe-webhook-url
        send_resolved: false

inhibit_rules: []
