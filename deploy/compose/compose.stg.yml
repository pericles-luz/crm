# Staging stack for the multi-tenant CRM — Fase 0 PR9 (SIN-62215).
#
# Contract with .github/workflows/cd-stg.yml:
#   1. The CD job builds ghcr.io/pericles-luz/crm and resolves the pushed digest.
#   2. It SSHes to the VPS and writes APP_IMAGE=ghcr.io/pericles-luz/crm@sha256:<d>
#      into /opt/crm/stg/.env.stg (alongside the secrets that already live there).
#   3. `docker compose -f compose.stg.yml pull && up -d --remove-orphans` then
#      converges the stack on the new digest.
#
# Image pinning policy (CEO follow-up on SIN-62208, AC #6 of SIN-62215):
#   - The app is referenced strictly by digest via APP_IMAGE — the variable form
#     is mandatory; compose fails fast if it is unset (`?required` syntax).
#   - Every infra image (postgres, caddy, redis, nats, minio) is pinned to a
#     versioned tag AND a SHA256 digest, so docker resolves by digest. The tag
#     is kept inline for human readability.
#   - Verification: `grep -E ':(latest|alpine)$' deploy/compose/compose.stg.yml`
#     MUST return zero lines. Bumping a digest is documented in
#     docs/deploy/staging.md → "Bumping infra image digests".

name: crm-stg

networks:
  crm: { driver: bridge }

volumes:
  postgres-data: {}
  redis-data: {}
  nats-data: {}
  minio-data: {}
  caddy-data: {}
  caddy-config: {}
  # SIN-63195 — per-host backup state. backup.sh writes
  # backup-last-success.json here so the size-threshold check
  # (LAST_SUCCESS_FLOOR_FRACTION_PCT) has prior-day data to compare against.
  # Named volume so the state survives image upgrades (ephemeral image,
  # durable state — matches the same pattern postgres-data uses).
  sindireceita-backup-state: {}

x-healthdefaults: &hd
  interval: 5s
  timeout: 3s
  retries: 10

services:
  postgres:
    image: postgres:16.4-alpine3.19@sha256:fca1f7c402bfedceed5537c7b0c85e6b30cec43414d3fa3ef7a48b946c46bf3c
    restart: unless-stopped
    networks: [crm]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set in /opt/crm/stg/.env.stg}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      <<: *hd
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]

  redis:
    image: redis:7.4.1-alpine3.20@sha256:c1e88455c85225310bbea54816e9c3f4b5295815e6dbf80c34d40afc6df28275
    restart: unless-stopped
    networks: [crm]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "redis-cli", "ping"]

  nats:
    image: nats:2.10.22-alpine3.20@sha256:73b0ba5fec5518c5f698597c58d2a3350a2b5ccae43e84c308f8d2da1242deca
    restart: unless-stopped
    networks: [crm]
    # `-m 8222` is REQUIRED — without it nats-server never opens the HTTP
    # monitoring listener and the /healthz probe below fails forever
    # (nats-docker upstream defaults monitoring to OFF). 8222 stays internal
    # to the crm network; we never publish it on the host.
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes: [nats-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]

  minio:
    image: quay.io/minio/minio:RELEASE.2024-10-13T13-34-11Z@sha256:9535594ad4122b7a78c6632788a989b96d9199b483d3bd71a5ceae73a922cdfa
    restart: unless-stopped
    networks: [crm]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER not set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD not set}
    volumes: [minio-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]

  # [SIN-62805] F2-05d — one-shot bucket + IAM-policy provisioning on
  # staging. Mirrors the local compose init job (`docker compose -f
  # deploy/compose/compose.yml up minio-init`) so a fresh staging
  # environment receives the `media` + `media-quarantine` buckets
  # plus the `app_runtime` / `worker_quarantine` policies before the
  # app's media path goes live. The script is idempotent — re-runs
  # on every deploy are no-ops once the resources exist.
  minio-init:
    image: minio/mc:latest
    networks: [crm]
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER not set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD not set}
    volumes:
      # On the VPS the operator places scripts/minio/ alongside the
      # compose file in /opt/crm/stg/, so this resolves to the same
      # relative path during `docker compose up`.
      - ./scripts/minio:/scripts/minio:ro
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null
        exec /scripts/minio/init-quarantine.sh local

  app:
    # APP_IMAGE is rewritten into /opt/crm/stg/.env.stg by the CD workflow each
    # deploy. Format: ghcr.io/pericles-luz/crm@sha256:<digest>.
    image: ${APP_IMAGE:?APP_IMAGE must be ghcr.io/pericles-luz/crm@sha256:<digest>}
    restart: unless-stopped
    networks: [crm]
    env_file: .env.stg
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      # SIN-65590 — defense-in-depth: hard-fail boot if the runtime DB role
      # bypasses RLS (SUPERUSER/BYPASSRLS). The compose default composes
      # DATABASE_URL from POSTGRES_USER (the bootstrap superuser `crm`); if
      # .env.stg does NOT override DATABASE_URL to the app_runtime
      # (NOBYPASSRLS) role, RLS is silently OFF and tenants see each other's
      # rows (SIN-65580). With this flag set, the app refuses to boot in that
      # state instead of serving cross-tenant data. The fix is to set
      # DATABASE_URL=postgres://app_runtime:...@postgres:5432/crm in .env.stg.
      DB_ENFORCE_RLS_ROLE: ${DB_ENFORCE_RLS_ROLE:-1}
      # SIN-65076 — operator-console hostname. Feeds httpapi.Deps.MasterHost
      # so the /m/* master console is reachable on a dedicated host and that
      # host joins the CSRF Origin/Referer allowlist. Sourced from .env.stg
      # (compose runs with --env-file /opt/crm/stg/.env.stg). The `:-` default
      # keeps it empty when unset — graceful degradation, console stays off.
      # Value is a CEO/operator decision; provisioning its DNS + TLS is a
      # separate operator action (see docs/deploy/staging.md §4).
      MASTER_CONSOLE_HOST: ${MASTER_CONSOLE_HOST:-}
    # No in-container healthcheck: distroless ships no shell/curl/wget. The
    # external smoke check in cd-stg.yml (curl https://.../health) is the
    # authoritative liveness gate; Caddy + restart:unless-stopped recover from
    # transient failures.
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      minio: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }

  # SIN-62332 / ADR 0079 §2 — Unbound sidecar parity with the local-dev
  # compose. Today Caddyfile.stg only serves literal $STG_TENANT_HOSTS
  # (no on_demand_tls catch-all) so the F44 DNS-rebinding surface is
  # closed by configuration. The sidecar is wired up regardless so that
  # turning on the custom-domain catch-all in stg cannot, by itself,
  # re-open the F44 attack class — parity is a deploy gate before any
  # `:443` catch-all flip in stg/prod (see docs/deploy/staging.md
  # §"Custom-domain catch-all (F44 / Unbound) deploy gate"). The active
  # gate is enforced by scripts/check-compose-unbound-parity.sh.
  unbound:
    image: mvance/unbound:1.22.0@sha256:76906da36d1806f3387338f15dcf8b357c51ce6897fb6450d6ce010460927e90
    restart: unless-stopped
    networks: [crm]
    volumes:
      # On the VPS the operator scps infra/caddy/unbound.conf alongside
      # the Caddyfile into /opt/crm/stg/caddy/ (see staging.md §4), so
      # the same `./caddy` mount surface is reused and the bind path
      # below resolves to /opt/crm/stg/caddy/unbound.conf.
      - ./caddy/unbound.conf:/opt/unbound/etc/unbound/a-records.conf:ro
    healthcheck:
      <<: *hd
      test: ["CMD", "drill", "@127.0.0.1", "-p", "5353", "example.com"]

  # SIN-63195 — encrypted Postgres backup pipeline as a compose sidecar.
  # Replaces the legacy host-installed `sindireceita-backup.service` +
  # `.timer` pair (lost in the 2026-05-09 fork reset per ADR 0085, preserved
  # on tag `main-legacy-pre-reconcile-20260509`). Pipeline:
  #   pg_dump (custom format) | age -R infra/age-backup.pub | aws s3 cp
  # Scheduling: supercronic inside the sidecar (cron-in-container), wall-clock
  # cron line `15 3 * * *` America/Sao_Paulo — matches the legacy
  # `OnCalendar=*-*-* 03:15:00 America/Sao_Paulo` timing. See ADR 0102 for the
  # decision rationale and the hardening-invariant mapping vs the systemd unit.
  #
  # The private age key lives offline (cofre fisico + SOPS-encrypted blob at
  # infra/sops/age-backup.key.enc). The scheduled service NEVER mounts the
  # private key — only the manual restore-drill invocation does, via
  # `docker compose run --rm -v /etc/sindireceita/age-backup.key:...:ro backup
  # /usr/local/bin/restore-drill.sh`. This preserves the legacy
  # `InaccessiblePaths=/etc/sindireceita/age-backup.key` invariant and is
  # enforced by internal/backup.TestComposeBackupSidecarDeniesPrivateKey.
  backup:
    # BACKUP_IMAGE is bootstrapped once into /opt/crm/stg/.env.stg after the
    # first `.github/workflows/build-backup-image.yml` run publishes the
    # initial digest to GHCR. Subsequent bumps follow the same model
    # documented in docs/deploy/staging.md → "Bumping infra image digests"
    # (PR-reviewed inline edit). Format MUST be:
    #   BACKUP_IMAGE=ghcr.io/pericles-luz/crm-backup@sha256:<64 hex>
    image: ${BACKUP_IMAGE:?BACKUP_IMAGE must be ghcr.io/pericles-luz/crm-backup@sha256:<digest>}
    restart: unless-stopped
    networks: [crm]
    # Run as nobody:nobody (65534:65534). Maps to legacy
    # `User=sindireceita-backup` on the systemd unit.
    user: "65534:65534"
    # Container root FS is read-only — image's own contents only.
    # Maps to legacy `ProtectSystem=strict`.
    read_only: true
    # Block setuid/setgid privilege escalation — even a vulnerable binary
    # in the image cannot raise effective caps mid-run. Maps to legacy
    # `NoNewPrivileges=true`.
    security_opt:
      - "no-new-privileges:true"
    # Drop every capability — `pg_dump`, `age`, and `aws s3 cp` need none.
    # Maps to legacy `RestrictSUIDSGID=true` + `ProtectKernelModules` etc.
    cap_drop:
      - ALL
    # Scratch space for the pg_dump output and the age ciphertext, both
    # cleaned up via the script's EXIT trap. Maps to legacy
    # `PrivateTmp=true`. The image's root FS is read_only, so without this
    # mount even mktemp would fail.
    tmpfs:
      - /tmp
    # Resource ceiling for the per-night run. Mirrors legacy
    # `MemoryMax=2G` and `CPUQuota=200%`.
    mem_limit: 2g
    cpus: "2.0"
    env_file: .env.stg
    environment:
      # SUPERCRONIC_TZ surfaces in the container as TZ so the embedded
      # crontab fires at America/Sao_Paulo 03:15 (matching the legacy
      # `OnCalendar=*-*-* 03:15:00 America/Sao_Paulo`).
      TZ: ${BACKUP_TZ:-America/Sao_Paulo}
      # DATABASE_URL composed against the in-network postgres service, same
      # as the app's. The script connects to postgres:5432 via the crm
      # bridge; no host port is required.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      # S3 / Backblaze B2 bucket name. AWS credentials and AWS_ENDPOINT_URL
      # come from `.env.stg` (env_file above).
      BACKUP_BUCKET: ${BACKUP_BUCKET:?BACKUP_BUCKET not set in /opt/crm/stg/.env.stg}
      BACKUP_AGE_RECIPIENTS: /opt/sindireceita/infra/age-backup.pub
      BACKUP_NODE_ID: ${BACKUP_NODE_ID:-stg}
      BACKUP_STATE_DIR: /var/lib/sindireceita
    volumes:
      # Backup-state durability across image upgrades. The script writes
      # backup-last-success.json here for the size-threshold check.
      - sindireceita-backup-state:/var/lib/sindireceita
    depends_on:
      postgres: { condition: service_healthy }

  caddy:
    image: caddy:2.8.4-alpine3.20@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    restart: unless-stopped
    networks: [crm]
    ports: ["80:80", "443:443"]
    # ADR 0079 §2 (SIN-62242 / SIN-62332): pin Caddy's container resolver
    # to the Unbound sidecar so HTTP-01 challenge name resolution (which
    # rides /etc/resolv.conf, NOT Caddy's `tls.resolvers` block) cannot
    # be redirected to a private/loopback IP via DNS rebinding.
    dns: ["unbound"]
    # Override Caddy's default `--config /etc/caddy/Caddyfile` so the local-dev
    # Caddyfile (auto_https off, *.crm.local) doesn't get used in stg. The stg
    # variant turns auto_https back on and picks site addresses from
    # $STG_TENANT_HOSTS.
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile.stg", "--adapter", "caddyfile"]
    environment:
      # Fase 6 default ([SIN-63218](/SIN/issues/SIN-63218)): 1 year (31536000s)
      # — the minimum the browser HSTS preload list accepts. Set this lower in
      # /opt/crm/stg/.env.stg only during a brand-new host's TLS soak (e.g.
      # `HSTS_MAX_AGE=300` while validating that the cert and routing path
      # work); the baked default keeps staging at parity with production so a
      # forgotten override does not silently re-open the MitM TLS downgrade
      # window flagged by the pen-test.
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-31536000}
      # Let's Encrypt account contact + the comma-separated FQDN list Caddy
      # provisions certs for. Both come from /opt/crm/stg/.env.stg via
      # --env-file. Required (compose fails fast if missing).
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL not set in /opt/crm/stg/.env.stg}
      STG_TENANT_HOSTS: ${STG_TENANT_HOSTS:?STG_TENANT_HOSTS not set in /opt/crm/stg/.env.stg}
    volumes:
      # `./caddy` resolves against the directory containing this compose
      # file, i.e. /opt/crm/stg/caddy/ on the VPS. The local-dev compose.yml
      # uses `../caddy` because deploy/compose/ and deploy/caddy/ are
      # peers in the source tree; on stg the operator scps both files into
      # the single /opt/crm/stg/caddy/ directory (see staging.md §4).
      - ./caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app: { condition: service_started }
      unbound: { condition: service_started }
