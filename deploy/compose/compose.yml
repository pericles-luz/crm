# Local CRM stack for Fase 0 (SIN-62208).
# Only Caddy publishes ports to the host; backing services stay on the
# internal `crm` network. Same template (without secrets) is reused for stg in PR9.

name: crm

networks:
  crm: { driver: bridge }

volumes:
  postgres-data: {}
  redis-data: {}
  nats-data: {}
  minio-data: {}
  caddy-data: {}
  caddy-config: {}

x-healthdefaults: &hd
  interval: 5s
  timeout: 3s
  retries: 10

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [crm]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      <<: *hd
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [crm]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "redis-cli", "ping"]

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    networks: [crm]
    command: ["-js", "-sd", "/data"]
    volumes: [nats-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    networks: [crm]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: [minio-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]

  app:
    image: golang:1.22-alpine
    restart: unless-stopped
    networks: [crm]
    working_dir: /src
    command: ["go", "run", "./cmd/server"]
    environment:
      HTTP_ADDR: ":8080"
    volumes: [../../:/src:ro]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      minio: { condition: service_healthy }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [crm]
    ports: ["80:80", "443:443", "8080:8080"]
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [app]
