# Local CRM stack for Fase 0 (SIN-62208).
# Only Caddy publishes ports to the host; backing services stay on the
# internal `crm` network. Same template (without secrets) is reused for stg in PR9.

name: crm

networks:
  crm: { driver: bridge }

volumes:
  postgres-data: {}
  redis-data: {}
  nats-data: {}
  minio-data: {}
  caddy-data: {}
  caddy-config: {}
  # [SIN-62805] F2-05d — shared between clamav (reader) and freshclam
  # (writer). Putting them in one named volume avoids any per-container
  # path divergence and keeps reloads atomic.
  clamav-db: {}
  clamav-log: {}
  # SIN-63195 — per-host backup state. See compose.stg.yml header for the
  # same volume in staging; dev usually never writes here (BACKUP_ENABLED=false
  # default skips the cron entry point), but the named volume keeps the
  # service definition parity-clean with stg so a dev who DOES exercise the
  # backup script with `docker compose run --rm backup /usr/local/bin/backup.sh`
  # gets the same on-disk layout.
  sindireceita-backup-state: {}

x-healthdefaults: &hd
  interval: 5s
  timeout: 3s
  retries: 10

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [crm]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      <<: *hd
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [crm]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "redis-cli", "ping"]

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    networks: [crm]
    # `-m 8222` is REQUIRED — without it nats-server never opens the HTTP
    # monitoring listener and the /healthz probe below fails forever
    # (nats-docker upstream defaults monitoring to OFF).
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes: [nats-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    networks: [crm]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: [minio-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]

  # [SIN-62805] F2-05d — one-shot bucket + IAM-policy provisioning. Runs
  # scripts/minio/init-quarantine.sh against the freshly-healthy MinIO so
  # the `media` and `media-quarantine` buckets plus the `app_runtime` /
  # `worker_quarantine` policies exist before the worker tries to use
  # them. The service exits 0 after one successful invocation
  # (restart: no). Re-running `docker compose up` is safe because the
  # script is idempotent — mc admin policy create / mc mb skip on present
  # resources.
  minio-init:
    image: minio/mc:latest
    networks: [crm]
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ../../scripts/minio:/scripts/minio:ro
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null
        exec /scripts/minio/init-quarantine.sh local

  # [SIN-62935] App + workers now run from purpose-built images out of
  # the repository Dockerfile (multi-target build) instead of the old
  # `golang:1.22-alpine` + `go run` + bind-mounted source pattern. Each
  # service declares its `target:` so `docker compose build` produces a
  # distroless, non-root image per binary (defence in depth + 12-factor
  # one-process-per-container). `make up` triggers the build on first
  # run, then reuses the cached `crm-*:dev` images. `make build`
  # rebuilds explicitly after a source change.
  app:
    image: crm-server:dev
    build:
      context: ../..
      dockerfile: Dockerfile
      target: crm-server
    restart: unless-stopped
    networks: [crm]
    # SIN-62212 / CEO review on PR1: the app container MUST NOT see
    # deploy/compose/.env or any path outside the source tree. Secrets
    # arrive via env_file (read by the docker daemon, never bind-mounted)
    # and DATABASE_URL is composed at compose-up time.
    env_file: .env
    environment:
      HTTP_ADDR: ":8080"
      # SIN-62243 F45 — internal listener for /internal/tls/ask.
      # NOT published in `ports:` — only the docker bridge network can
      # reach it (Caddy via `app:8081`).
      INTERNAL_HTTP_ADDR: ":8081"
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      # SIN-65590 — defense-in-depth: hard-fail boot if the runtime DB role
      # bypasses RLS (SUPERUSER/BYPASSRLS). The compose default composes
      # DATABASE_URL from POSTGRES_USER (the bootstrap superuser `crm`); prod
      # MUST override DATABASE_URL to the app_runtime (NOBYPASSRLS) role in
      # .env, or RLS is silently OFF and tenants see each other's rows
      # (SIN-65580). With this flag set the app refuses to boot in that state.
      DB_ENFORCE_RLS_ROLE: ${DB_ENFORCE_RLS_ROLE:-1}
      # SIN-66324 — defense-in-depth: hard-fail boot if a Postgres DSN
      # (DATABASE_URL / WA_SESSION_DATABASE_URL) disables TLS-in-transit
      # (sslmode in disable/allow/prefer, or absent → libpq `prefer`, which
      # falls back to cleartext). The guard ALWAYS WARNs in that case; this
      # flag turns the warning into a hard boot failure. Default "0" because
      # the compose default DATABASE_URL targets the bundled same-host
      # `postgres` service, which serves no TLS (traffic stays on the docker
      # bridge — the in-transit risk the operator accepted in SIN-66301).
      # Flip to "1" once DATABASE_URL points at a TLS-capable Postgres
      # (sslmode=require, verify-full when a CA bundle is available). At-rest
      # encryption (LUKS) is out of scope for this guard.
      DB_ENFORCE_DB_TLS: ${DB_ENFORCE_DB_TLS:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Default ON. Flip to "false" to globally disable on-demand TLS.
      CUSTOMDOMAIN_ASK_ENABLED: ${CUSTOMDOMAIN_ASK_ENABLED:-true}
    expose: ["8081"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      minio: { condition: service_healthy }

  # ADR 0079 §2 — Unbound sidecar that protects ACME HTTP-01 / DNS-01
  # challenges from DNS rebinding into private/loopback ranges. Caddy is
  # configured (Caddyfile dns_resolvers) to send EVERY recursive query
  # through this sidecar; nothing else in the compose network should.
  unbound:
    image: mvance/unbound:latest
    restart: unless-stopped
    networks: [crm]
    volumes:
      - ../../infra/caddy/unbound.conf:/opt/unbound/etc/unbound/a-records.conf:ro
    healthcheck:
      <<: *hd
      test: ["CMD", "drill", "@127.0.0.1", "-p", "5353", "example.com"]

  # [SIN-62788] F2-05 — ClamAV daemon used by the mediascan worker.
  # The freshclam sidecar (below) keeps signatures fresh; clamd itself
  # serves INSTREAM scans on tcp/3310 — only reachable from the docker
  # network, never published to the host.
  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    networks: [crm]
    volumes: [clamav-db:/var/lib/clamav]
    healthcheck:
      <<: *hd
      # `clamdscan --ping` returns 0 when clamd is up and accepting
      # INSTREAM commands. The default 5s start period (parent hd
      # anchor) is short — bump on slow CI if needed.
      test: ["CMD", "clamdscan", "--ping", "1"]

  # [SIN-62805] F2-05d — `freshclam` sidecar. Runs every 24h via the
  # image's built-in cron entrypoint to refresh signatures into the
  # shared `clamav-db` volume; clamd picks the new signatures up on its
  # own scheduled reload. The worker persists the resulting engine ID
  # into `message.media.scan_engine` on every scan (already wired via
  # the clamav adapter's two-dial flow — zVERSION → zINSTREAM).
  freshclam:
    image: clamav/clamav:latest
    restart: unless-stopped
    networks: [crm]
    # Override the default entrypoint (which starts clamd) to run only
    # freshclam in cron mode. `--daemon` keeps it alive and rotates the
    # DB every 24h; `--checks 1` is one check per cycle.
    entrypoint: ["/usr/local/bin/freshclam"]
    command: ["--daemon", "--foreground=true", "--checks=1", "--log=/var/log/clamav/freshclam.log"]
    volumes:
      - clamav-db:/var/lib/clamav
      - clamav-log:/var/log/clamav

  # [SIN-62804] F2-05c — mediascan worker. Reads `media.scan.requested`
  # from JetStream, scans the blob via clamd, persists the verdict, and
  # publishes `media.scan.completed`. [SIN-62805] F2-05d wires the
  # Quarantiner + Alerter so infected blobs are moved + #security is paged.
  mediascan-worker:
    image: crm-mediascan-worker:dev
    build:
      context: ../..
      dockerfile: Dockerfile
      target: crm-mediascan-worker
    restart: unless-stopped
    networks: [crm]
    env_file: .env
    environment:
      NATS_URL: nats://nats:4222
      POSTGRES_DSN: ${DATABASE_URL:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      CLAMD_ADDR: clamav:3310
      # MinIO config consumed by the SIN-62805 quarantine adapter.
      # Credentials come from the STS bootstrap flow described in
      # docs/runbooks/minio-bucket-policy.md; the values below are the
      # local-dev defaults from .env.
      MINIO_ENDPOINT: http://minio:9000
      MINIO_QUARANTINE_SOURCE: media
      MINIO_QUARANTINE_DEST: media-quarantine
      # Slack webhook stays out of the YAML — read from .env via env_file.
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
      minio: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
      clamav: { condition: service_healthy }

  # [SIN-62912] Fase 3 W3D — wallet-balance Slack alerter. Subscribes to
  # the `wallet.balance.depleted` JetStream subject (published by the
  # wallet debit path) and POSTs a single Slack message to the operator
  # alerts channel for every depletion event. Degraded mode (empty
  # SLACK_ALERTS_WEBHOOK_URL) keeps the worker consuming + acking events
  # without crashing — see AC #3 of SIN-62905.
  wallet-alerter-worker:
    image: crm-wallet-alerter-worker:dev
    build:
      context: ../..
      dockerfile: Dockerfile
      target: crm-wallet-alerter-worker
    restart: unless-stopped
    networks: [crm]
    env_file: .env
    environment:
      NATS_URL: nats://nats:4222
      NATS_INSECURE: "1"
      # SLACK_ALERTS_WEBHOOK_URL stays out of the YAML — read from .env
      # via env_file (or unset for degraded mode). Operators MUST NOT
      # set the URL inline here: docker exposes `environment:` values in
      # `docker inspect`, and inlining the secret leaks it to any reader
      # of the compose file.
    depends_on:
      nats: { condition: service_healthy }

  # SIN-63195 — backup pipeline sidecar parity with staging. In local dev
  # the cron is OFF by default (BACKUP_ENABLED=false in `.env.example`), so
  # `docker compose up` does NOT fire pg_dump every night. Devs exercise the
  # pipeline ad-hoc via:
  #   docker compose run --rm backup /usr/local/bin/backup.sh
  # See ADR 0102 for the full architecture and the hardening-invariant
  # mapping vs the legacy host systemd unit.
  backup:
    image: crm-backup:dev
    build:
      context: ../..
      dockerfile: infra/backup/Dockerfile
    # In dev we do NOT auto-restart this container — if the dev runs the
    # one-shot backup ad-hoc, they want to see the exit code, not have it
    # respawned.
    restart: "no"
    networks: [crm]
    # Same hardening posture as stg — see compose.stg.yml backup service
    # comment for the 1:1 mapping vs the legacy systemd primitives.
    user: "65534:65534"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 2g
    # SIN-63195 SE-review MEDIUM #2: AWS_* credentials MUST come from
    # env_file (read by the docker daemon, never bind-mounted) and NEVER
    # from `environment:` — values placed in `environment:` are visible
    # via `docker inspect`, mirroring the same warning at the
    # wallet-alerter-worker service definition above. The bootstrap
    # values for local MinIO live in `.env.example`; copy that to `.env`.
    env_file: .env
    environment:
      TZ: ${BACKUP_TZ:-America/Sao_Paulo}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      # Dev default bucket points at the local MinIO instance.
      BACKUP_BUCKET: ${BACKUP_BUCKET:-sindireceita-backup-dev}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://minio:9000}
      BACKUP_AGE_RECIPIENTS: /opt/sindireceita/infra/age-backup.pub
      BACKUP_NODE_ID: ${BACKUP_NODE_ID:-dev}
      BACKUP_STATE_DIR: /var/lib/sindireceita
    volumes:
      - sindireceita-backup-state:/var/lib/sindireceita
    depends_on:
      postgres: { condition: service_healthy }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [crm]
    ports: ["80:80", "443:443", "8080:8080"]
    # ADR 0079 §2 (SIN-62242): pin Caddy's container resolver to the
    # Unbound sidecar. This catches HTTP-01 challenge name resolution,
    # which goes through the OS resolver (not Caddy's `tls.resolvers`
    # block, which only covers DNS-01 plugin lookups).
    dns: ["unbound"]
    environment:
      # Fase 6 default ([SIN-63218](/SIN/issues/SIN-63218)): 1 year (31536000s)
      # — the minimum the browser HSTS preload list accepts. Operators MAY
      # override HSTS_MAX_AGE downward during a brand-new host's TLS soak, but
      # the baked default is secure-by-default so a fresh `compose up` is not
      # exposed to the 5-minute MitM downgrade window the pen-test flagged.
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-31536000}
    volumes:
      # Mount the directory (not just the Caddyfile) so the security-headers
      # import in deploy/caddy/security-headers.caddy resolves inside the container.
      - ../caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app: { condition: service_started }
      unbound: { condition: service_started }
