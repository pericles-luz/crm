# Local CRM stack for Fase 0 (SIN-62208).
# Only Caddy publishes ports to the host; backing services stay on the
# internal `crm` network. Same template (without secrets) is reused for stg in PR9.

name: crm

networks:
  crm: { driver: bridge }

volumes:
  postgres-data: {}
  redis-data: {}
  nats-data: {}
  minio-data: {}
  caddy-data: {}
  caddy-config: {}

x-healthdefaults: &hd
  interval: 5s
  timeout: 3s
  retries: 10

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [crm]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      <<: *hd
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [crm]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "redis-cli", "ping"]

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    networks: [crm]
    # `-m 8222` is REQUIRED — without it nats-server never opens the HTTP
    # monitoring listener and the /healthz probe below fails forever
    # (nats-docker upstream defaults monitoring to OFF).
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes: [nats-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    networks: [crm]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: [minio-data:/data]
    healthcheck:
      <<: *hd
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]

  app:
    image: golang:1.22-alpine
    restart: unless-stopped
    networks: [crm]
    working_dir: /src
    command: ["go", "run", "./cmd/server"]
    # SIN-62212 / CEO review on PR1: the app container MUST NOT see
    # deploy/compose/.env or any path outside the source tree. Secrets
    # arrive via env_file (read by the docker daemon, never bind-mounted)
    # and DATABASE_URL is composed at compose-up time. PR9 replaces the
    # selective binds below with a multi-stage image build.
    env_file: .env
    environment:
      HTTP_ADDR: ":8080"
      # SIN-62243 F45 — internal listener for /internal/tls/ask.
      # NOT published in `ports:` — only the docker bridge network can
      # reach it (Caddy via `app:8081`).
      INTERNAL_HTTP_ADDR: ":8081"
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Default ON. Flip to "false" to globally disable on-demand TLS.
      CUSTOMDOMAIN_ASK_ENABLED: ${CUSTOMDOMAIN_ASK_ENABLED:-true}
    expose: ["8081"]
    volumes:
      - ../../go.mod:/src/go.mod:ro
      - ../../go.sum:/src/go.sum:ro
      - ../../cmd:/src/cmd:ro
      - ../../internal:/src/internal:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      minio: { condition: service_healthy }

  # ADR 0079 §2 — Unbound sidecar that protects ACME HTTP-01 / DNS-01
  # challenges from DNS rebinding into private/loopback ranges. Caddy is
  # configured (Caddyfile dns_resolvers) to send EVERY recursive query
  # through this sidecar; nothing else in the compose network should.
  unbound:
    image: mvance/unbound:latest
    restart: unless-stopped
    networks: [crm]
    volumes:
      - ../../infra/caddy/unbound.conf:/opt/unbound/etc/unbound/a-records.conf:ro
    healthcheck:
      <<: *hd
      test: ["CMD", "drill", "@127.0.0.1", "-p", "5353", "example.com"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [crm]
    ports: ["80:80", "443:443", "8080:8080"]
    # ADR 0079 §2 (SIN-62242): pin Caddy's container resolver to the
    # Unbound sidecar. This catches HTTP-01 challenge name resolution,
    # which goes through the OS resolver (not Caddy's `tls.resolvers`
    # block, which only covers DNS-01 plugin lookups).
    dns: ["unbound"]
    environment:
      # Fase 0 default mirrors staging so a bad header rolls back in < 5 min.
      # Fase 1 production overrides to 63072000 (ADR 0082 / SIN-62229).
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-300}
    volumes:
      # Mount the directory (not just the Caddyfile) so the security-headers
      # import in deploy/caddy/security-headers.caddy resolves inside the container.
      - ../caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app: { condition: service_started }
      unbound: { condition: service_started }
