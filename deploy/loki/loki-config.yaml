# Loki runtime config for the CRM stack (SIN-62253, ADR 0004 decisão 3).
#
# Retention policy: 30 days, enforced by the compactor.
#   - limits_config.retention_period sets the global retention horizon.
#   - compactor.retention_enabled flips the compactor from "compact only"
#     into "compact + delete past-retention chunks". Without this flag,
#     limits_config.retention_period is advisory only and chunks pile up
#     forever (we got bit by this on the original PoC stack).
#   - retention_delete_delay buffers actual deletion two hours after a
#     chunk crosses the horizon so an in-flight query has time to finish.
#
# Storage: single-binary filesystem (TSDB schema v13). Adequate for stg.
# Production splits index/chunks to object storage (s3/B2) via a follow-up
# task — schema below is forward-compatible (v13 + tsdb).
#
# Verification:
#   curl -s http://loki:3100/config | grep -E 'retention_period|retention_enabled'

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

# 30-day retention (ADR 0004 decisão 3 — alinhado com pg_dump retention).
# Reduce LGPD scope: logs older than 30d are deleted, not archived.
# If an incident requires older logs, export must happen BEFORE day 25
# (see docs/ops/runbook-logs.md "incident export" section).
limits_config:
  retention_period: 720h # 30d
  reject_old_samples: true
  reject_old_samples_max_age: 168h # 7d — match Prometheus retention bound
  max_query_length: 721h # retention_period + 1h slack
  allow_structured_metadata: true

# Compactor enforces deletion of chunks past retention_period.
# Without retention_enabled: true the chunks never get deleted.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# Ruler is wired but rules directory is empty — alerts shipped from
# Prometheus side. Keep ruler enabled so promtool-style rule validation
# is available against Loki later if needed.
ruler:
  alertmanager_url: http://alertmanager:9093
  storage:
    type: local
    local:
      directory: /loki/rules-alertmanager
  rule_path: /loki/rules-tmp
  enable_alertmanager_v2: true
  enable_api: true

# Disable the upstream "anonymous usage" beacon — stg/prod must not
# emit telemetry to grafana.com.
analytics:
  reporting_enabled: false
