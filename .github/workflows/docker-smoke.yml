# PR-time docker build smoke — SIN-62301.
#
# Postmortem follow-up to SIN-62297. PR #28 merged 8/8 green, then `cd-stg`
# failed 23s later at `[builder 4/7] RUN go mod download` because the
# Dockerfile builder was pinned at `golang:1.24.5-alpine` while go.mod had
# been bumped to `toolchain go1.25.9`. None of the eight PR-time CI jobs
# actually exercised `docker build` — they all use `actions/setup-go`, which
# installs Go independently of the Dockerfile builder image — so the
# Dockerfile-vs-go.mod consistency was uncheckable until after merge.
#
# This workflow runs the multi-stage `builder` target whenever a PR touches
# the files that determine that consistency. Build-only smoke (no push, no
# load) — the failure mode we care about (`go mod download` against the
# pinned builder image) shows up before the runtime stage, so building the
# `builder` target alone is enough signal at the lowest cost. Cache is GHA
# scoped so a no-change rebuild stays under ~1 min on the median PR.
#
# Complementary to (NOT duplicate of) SIN-62298 (govulncheck): that gate is
# call-graph CVE reachability on source; this gate is build-sandbox vs
# go.mod toolchain consistency. Both are fail-closed.
#
# Pin policy: third-party actions are SHA-pinned per SIN-62303 / SIN-62307.
# Bump the SHA and the trailing version comment together when upgrading.

name: docker-smoke

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - go.mod
      - go.sum
      - .github/workflows/docker-smoke.yml

permissions:
  contents: read

jobs:
  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: set up buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      # Build the `builder` stage only. The Dockerfile-vs-go.mod failure that
      # broke us (SIN-62297) surfaces at `go mod download` inside this stage,
      # so building further adds runtime without adding signal. push:false +
      # load:false means buildx never materialises the image into the local
      # daemon — we only care that the build sandbox could compile.
      - name: docker build --target builder
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          file: Dockerfile
          target: builder
          push: false
          load: false
          cache-from: type=gha,scope=docker-smoke
          cache-to: type=gha,scope=docker-smoke,mode=max
          provenance: false
