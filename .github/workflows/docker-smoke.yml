# PR-time docker build + image-scan smoke — SIN-62301, extended in SIN-62935.
#
# Originally a single builder-only build to catch the postmortem from
# SIN-62297 (PR #28 merged 8/8 green, then `cd-stg` failed at
# `[builder] RUN go mod download` because the Dockerfile builder was
# pinned at `golang:1.24.5-alpine` while go.mod had bumped to
# `toolchain go1.26.3`). None of the PR-time CI jobs exercised
# `docker build` — they all use `actions/setup-go`, which installs Go
# independently of the Dockerfile builder image.
#
# SIN-62935 made the Dockerfile multi-target (crm-server +
# crm-mediascan-worker + crm-wallet-alerter-worker). The smoke now
# matrixes across each final target so a worker-only compile or runtime
# regression is caught at PR time. Each matrix leg also runs `trivy
# image --severity HIGH,CRITICAL --exit-code 1` on the loaded image
# (SIN-62935 AC #4) — distroless/static images should be clean, so any
# HIGH+ finding indicates either a base-image bump is needed or a vuln
# was introduced via go.sum.
#
# Complementary to (NOT duplicate of) SIN-62298 (govulncheck): that
# gate is call-graph CVE reachability on source; this gate exercises
# the runtime images themselves. Both are fail-closed.
#
# Pin policy: third-party actions are SHA-pinned per SIN-62303 /
# SIN-62307. Bump the SHA and the trailing version comment together
# when upgrading.

name: docker-smoke

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - go.mod
      - go.sum
      - cmd/**
      - .github/workflows/docker-smoke.yml

permissions:
  contents: read

jobs:
  docker-smoke:
    name: docker-smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        target:
          - crm-server
          - crm-mediascan-worker
          - crm-wallet-alerter-worker
    steps:
      - name: checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: set up buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # Build the named final stage and load it into the local Docker
      # daemon so trivy can scan the image bytes. Cache is GHA scoped
      # per target to keep cold-build times manageable on a 3-leg matrix.
      - name: docker build --target ${{ matrix.target }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          tags: local/${{ matrix.target }}:smoke
          push: false
          load: true
          cache-from: type=gha,scope=docker-smoke-${{ matrix.target }}
          cache-to: type=gha,scope=docker-smoke-${{ matrix.target }},mode=max
          provenance: false

      # SIN-62935 AC #4 — fail the PR on any HIGH or CRITICAL CVE in the
      # loaded image. distroless/static has historically been clean, so
      # a finding here means either the base digest needs to bump (pin
      # in Dockerfile) or a transitive dep added a vulnerable native lib.
      - name: trivy image scan (${{ matrix.target }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: local/${{ matrix.target }}:smoke
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library

      # SIN-63299 — runtime asset smoke. The crm-server image must ship
      # web/static/ to /app/web/static so the FileServer in
      # cmd/server/customdomain_wire.go can serve /static/css/*,
      # /static/customdomain.css and /static/customdomain.js. Before
      # SIN-63299 this was untested at the container layer: unit tests
      # in cmd/server/auth_css_static_test.go and privacy_wire_test.go
      # used http.Dir("../../web/static") against the source tree, so
      # the build-context regression that dropped the assets from the
      # runtime image (SIN-63299 postmortem) passed every PR check. This
      # step boots the just-built image and curls each asset route.
      #
      # The crm-server entrypoint normally needs DATABASE_URL, NATS, etc.
      # to fully start. To keep the smoke independent of that, we run a
      # minimal alpine sidecar that mounts the image's /app/web/static
      # via `docker cp` and re-serves it through a stock python
      # http.server pinned to the same FileServer semantics. That keeps
      # the test asserting "the bytes are present in the runtime image
      # at the expected path with the expected MIME type" without
      # bringing up Postgres in CI. If a future change moves the assets
      # to a different WORKDIR, this step will fail because `docker cp`
      # of /app/web/static will return the wrong tree.
      - name: runtime asset routes (crm-server)
        if: matrix.target == 'crm-server'
        run: |
          set -euo pipefail
          # Extract the asset tree from the image without booting the
          # crm-server entrypoint (which needs DATABASE_URL et al.).
          # `docker create` with the loaded image is enough to make the
          # filesystem layers available to `docker cp`.
          CID=$(docker create local/crm-server:smoke)
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
          mkdir -p ./smoke-static
          docker cp "$CID:/app/web/static/." ./smoke-static/

          # Serve the extracted tree with python's http.server, which
          # uses mimetypes.guess_type and returns text/css for *.css and
          # text/javascript for *.js (RFC 9239). Go 1.18+ mime.TypeByExtension
          # also emits text/javascript, so the Content-Type check below
          # accepts both text/* and application/* JS variants and is the
          # closest local stand-in for the FileServer in
          # cmd/server/customdomain_wire.go without booting the full
          # crm-server entrypoint.
          (cd smoke-static && python3 -m http.server 8081 >/tmp/static-srv.log 2>&1) &
          SRV_PID=$!
          trap 'kill "$SRV_PID" 2>/dev/null || true; docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          # Wait for the server to accept connections.
          for i in $(seq 1 20); do
            if curl -fsI "http://127.0.0.1:8081/" >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done

          # Each route MUST return 200 with a CSS or JS Content-Type.
          # text/plain here is the FileServer's 404 default and the
          # exact symptom from the SIN-63299 staging report.
          fail=0
          check() {
            local path="$1" ; local want_mime="$2"
            local hdrs
            hdrs=$(curl -fsI "http://127.0.0.1:8081${path}") || {
              echo "FAIL: ${path} — non-200"
              fail=1
              return
            }
            if ! grep -iEq "^content-type:.*${want_mime}" <<<"$hdrs"; then
              echo "FAIL: ${path} — content-type mismatch (want ${want_mime})"
              echo "$hdrs"
              fail=1
              return
            fi
            echo "OK:   ${path} (${want_mime})"
          }

          check /css/auth.css         text/css
          check /css/privacy.css      text/css
          check /css/aipanel.css      text/css
          check /css/campaigns.css    text/css
          check /css/contacts.css     text/css
          check /css/funnel.css       text/css
          check /css/funnel-rules.css text/css
          check /css/inbox.css        text/css
          check /customdomain.css     text/css
          check /customdomain.js      '(text|application)/(javascript|x-javascript)'
          check /js/campaigns.js      '(text|application)/(javascript|x-javascript)'
          check /js/funnel-board.js   '(text|application)/(javascript|x-javascript)'

          if [ "$fail" -ne 0 ]; then
            echo "----"
            echo "crm-server runtime image is missing one or more web/static/ assets."
            echo "Check Dockerfile crm-server stage COPY --from=builder /src/web/static."
            exit 1
          fi

      # SIN-63303 — runtime route smoke. The python re-serve step above
      # catches *bytes missing from the image* but cannot detect *route
      # missing from runWith*: pre-fix, the /static/ FileServer lived
      # behind registerCustomDomainRoutes which is gated on
      # CUSTOM_DOMAIN_UI_ENABLED=1, so /static/* silently 404'd on every
      # tenant host in staging despite the bytes being present (the
      # SIN-63299 postmortem). This step actually boots cmd/server's
      # runWith via Go (no Postgres, no Redis, no CUSTOM_DOMAIN_UI_ENABLED)
      # and asserts /static/css/auth.css returns 200 text/css through the
      # real handler chain. If a future refactor re-buries the FileServer
      # behind a feature flag, this step fails the PR red instead of
      # waiting for a staging deploy to surface the regression.
      - name: runtime route smoke runWith (crm-server)
        if: matrix.target == 'crm-server'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: go.mod
          cache: false

      - name: go test runWith static routes (crm-server)
        if: matrix.target == 'crm-server'
        run: |
          set -euo pipefail
          go test -count=1 -run '^TestRunWith_ServesStaticUnconditionally$|^TestRunWith_StaticServesVendorAssets$' ./cmd/server/...
