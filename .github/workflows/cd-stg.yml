# Continuous Delivery to staging — Fase 0 PR9 (SIN-62215).
#
# Wakes on every successful run of the `ci` workflow on `main` (chained via
# workflow_run). Builds the image, pushes it to GHCR, SSHes to the staging VPS,
# updates the digest reference in /opt/crm/stg/.env.stg, runs `compose pull && up -d`,
# and then performs an external smoke check from the GitHub runner.
#
# Failure model (AC #3 of SIN-62215): if the smoke check fails, the job is red,
# the previous container keeps running (compose up -d --no-deps app fails fast),
# and rollback is MANUAL. Auto-rollback is deferred to Fase 6 / a follow-up.
#
# Image policy: every image referenced by the staging stack — including the one
# this workflow pushes — is consumed by digest, not by tag. See
# deploy/compose/compose.stg.yml and the AC #6 grep.

name: cd-stg

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write
  # OIDC token for cosign keyless signing — see docs/adr/0084-supply-chain.md
  # (SIN-62247). Without this, `cosign sign` cannot mint a Fulcio cert.
  id-token: write

concurrency:
  group: cd-stg
  cancel-in-progress: false

env:
  IMAGE_REPO: ghcr.io/pericles-luz/crm
  # Pinned per ADR 0084. Bump the version + the installer SHA together.
  COSIGN_VERSION: v2.4.1
  SYFT_VERSION: v1.14.0

jobs:
  deploy-stg:
    name: deploy-stg
    runs-on: ubuntu-latest
    # Only deploy when the CI run that triggered us was green AND we are
    # running on the upstream repo. SIN-63281: the fork
    # (ia-dev-sindireceita/crm) does not own the GHCR namespace
    # `pericles-luz/crm` and its GITHUB_TOKEN cannot write there — every
    # post-reconcile push 403'd. Pericles' normative call (board comment on
    # SIN-63281): "Só o repositório `pericles-luz/crm` pode mandar pra
    # stg". Gating the job on owner keeps the workflow file identical on
    # both repos (no fork drift) but turns the fork into a no-op for the
    # deploy stage. Drop the owner check if the deploy account/registry
    # ever moves off `pericles-luz`.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.repository_owner == 'pericles-luz' }}
    timeout-minutes: 8
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.compose-ref.outputs.ref }}
    steps:
      - name: checkout main at the SHA that produced the green CI run
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          file: Dockerfile
          # SIN-62935 made Dockerfile multi-target (crm-server +
          # crm-mediascan-worker + crm-wallet-alerter-worker). Targeting
          # crm-server explicitly so a future stage reorder cannot
          # silently push a worker image as ghcr.io/pericles-luz/crm.
          target: crm-server
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.IMAGE_REPO }}:main
          # SIN-63146 — inject the workflow_run head SHA into
          # internal/version.commitSHA via the Dockerfile's COMMIT_SHA
          # ARG. The smoke step below greps /health for this value and
          # fails red if the running container still reports a stale
          # SHA (i.e. `docker compose pull` was skipped on the VPS).
          build-args: |
            COMMIT_SHA=${{ github.event.workflow_run.head_sha }}
          # Inline cache keeps successive runs ~3 min faster than cold builds,
          # which is what makes AC #2 (≤ 8 min wall) feasible on the standard runner.
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max
          provenance: false

      - name: compose APP_IMAGE reference
        id: compose-ref
        run: echo "ref=${IMAGE_REPO}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # ADR 0084 / SIN-62247 — sign the digest before anything else can pull it.
      # SHA-pinned per SIN-62303; bump SHA + trailing version comment together.
      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: cosign sign image (keyless, GitHub OIDC)
        env:
          IMAGE_REF: ${{ steps.compose-ref.outputs.ref }}
        run: |
          set -euo pipefail
          # --yes skips the interactive transparency-log opt-in prompt.
          # The signature binds to the digest, never the floating tag.
          cosign sign --yes "${IMAGE_REF}"

      # SHA-pinned per SIN-62303; bump SHA + trailing version comment together.
      - name: install syft
        uses: anchore/sbom-action/download-syft@9f7302141466aa6482940f15371237e9d9f4c34a  # v0.17.7
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      - name: generate SBOMs (CycloneDX 1.5 + SPDX 2.3)
        env:
          IMAGE_REF: ${{ steps.compose-ref.outputs.ref }}
        run: |
          set -euo pipefail
          syft "${IMAGE_REF}" -o "cyclonedx-json@1.5=sbom.cyclonedx.json"
          syft "${IMAGE_REF}" -o "spdx-json@2.3=sbom.spdx.json"

      - name: cosign attest CycloneDX SBOM
        env:
          IMAGE_REF: ${{ steps.compose-ref.outputs.ref }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            "${IMAGE_REF}"

      - name: cosign attest SPDX SBOM
        env:
          IMAGE_REF: ${{ steps.compose-ref.outputs.ref }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_REF}"

      # SHA-pinned per SIN-62303; bump SHA + trailing version comment together.
      - name: upload SBOMs as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sbom-${{ github.event.workflow_run.head_sha }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          if-no-files-found: error
          retention-days: 90

      - name: install ssh client
        run: sudo apt-get update -qq && sudo apt-get install -qq -y openssh-client

      - name: configure ssh
        env:
          STG_SSH_KEY: ${{ secrets.STG_SSH_KEY }}
          STG_HOST: ${{ secrets.STG_HOST }}
          STG_HOST_KEY: ${{ secrets.STG_HOST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STG_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # known_hosts populated from a secret so we never trust on first use.
          # See docs/deploy/staging.md → "Capturing the staging host key".
          printf '%s\n' "$STG_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # SIN-63350 — preflight: detect cosign missing on VPS before deploy.
      #
      # The wrapper at /opt/crm/stg/bin/deploy.sh runs `command -v cosign`
      # before both `deploy` and `migrate-up`. If cosign is not on the
      # non-interactive SSH PATH (typical case: cosign installed at
      # /usr/local/bin/cosign but the SSH `command="…"` authorized_keys
      # constraint inherits a stripped PATH), the wrapper exits 67 with
      # `stg-deploy: cosign not found in PATH`. cd-stg run 26334123677
      # tripped exactly this: SIN-63335 / SIN-63348 forensics showed the
      # failure was at `deploy via ssh`, NOT at migrate-up — the existing
      # wrapper-stale preflight (between /health and migrate-up) runs too
      # late to catch it.
      #
      # This preflight invokes the SIN-63350 `preflight` verb on the
      # wrapper (deploy/scripts/stg-deploy.sh). The verb takes no
      # image-ref, checks `command -v cosign`, and exits 0 (cosign
      # present) or 67 (cosign missing). SSH propagates the exit code so
      # the workflow goes red here, with the remediation block below
      # naming the canonical install procedure in
      # docs/deploy/staging.md §VPS-bootstrap (lines 437-474).
      #
      # Authentication / surface area: same locked-down SSH key + same
      # authorized_keys command="/opt/crm/stg/bin/deploy.sh" constraint
      # as the deploy / migrate-up / wrapper-stale-preflight steps. The
      # wrapper itself is the only thing the runner can invoke. No new
      # SSH key, no widened command=, no inlined cosign install bytes
      # (operator-bootstrap per staging.md §VPS-bootstrap — CI never
      # installs cosign on the VPS, by design).
      - name: preflight cosign present on VPS
        timeout-minutes: 1
        env:
          STG_HOST: ${{ secrets.STG_HOST }}
          STG_USER: ${{ secrets.STG_USER }}
        run: |
          set -uo pipefail
          # Capture stdout+stderr together so the remediation block can
          # echo whatever the wrapper said. We intentionally do NOT
          # short-circuit on a non-zero exit before printing the output.
          output="$(ssh -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              "${STG_USER}@${STG_HOST}" \
              "preflight" 2>&1)"
          rc=$?
          if [ "${rc}" -eq 0 ]; then
            # The wrapper prints `stg-deploy: preflight OK — cosign
            # present` on success. We surface the line so the workflow
            # log shows positive confirmation rather than empty silence.
            printf '%s\n' "${output:-preflight OK}"
            exit 0
          fi
          echo "::error::cosign is not on PATH on ${STG_HOST} — cd-stg cannot proceed (stg-deploy exit ${rc})."
          {
            echo "stale-component: cosign binary on ${STG_HOST}"
            echo "expected:        \`command -v cosign\` returns 0 under the cd-stg SSH command=…"
            echo "                 constraint (non-interactive PATH)"
            echo "observed:        ${output:-<empty>} (wrapper exit ${rc})"
            echo
            echo "remediation (operator, see docs/deploy/staging.md §VPS-bootstrap, lines 437-474):"
            echo "  # On the VPS as root, install cosign >= v2.4 from the Sigstore"
            echo "  # release, self-verify against its own signature, then drop into"
            echo "  # /usr/local/bin so the deploy user's PATH sees it:"
            echo "  COSIGN_VERSION=2.4.1"
            echo "  BASE=\"https://github.com/sigstore/cosign/releases/download/v\${COSIGN_VERSION}\""
            echo "  curl -fsSL \"\${BASE}/cosign-linux-amd64\"     -o /tmp/cosign"
            echo "  curl -fsSL \"\${BASE}/cosign-linux-amd64.sig\" -o /tmp/cosign.sig"
            echo "  curl -fsSL \"\${BASE}/cosign-linux-amd64.pem\" -o /tmp/cosign.pem"
            echo "  install -m 0755 /tmp/cosign /usr/local/bin/cosign"
            echo "  cosign verify-blob \\"
            echo "    --certificate /tmp/cosign.pem \\"
            echo "    --signature   /tmp/cosign.sig \\"
            echo "    --certificate-identity-regexp '^https://github\\.com/sigstore/cosign/' \\"
            echo "    --certificate-oidc-issuer     'https://token.actions.githubusercontent.com' \\"
            echo "    /tmp/cosign"
            echo "  rm -f /tmp/cosign /tmp/cosign.sig /tmp/cosign.pem"
            echo "  # Re-run this workflow once \`cosign version\` succeeds."
          } >&2
          exit 1

      - name: deploy via ssh
        env:
          STG_HOST: ${{ secrets.STG_HOST }}
          STG_USER: ${{ secrets.STG_USER }}
          APP_IMAGE_REF: ${{ steps.compose-ref.outputs.ref }}
        run: |
          set -euo pipefail
          # The remote constraint in /home/<user>/.ssh/authorized_keys runs
          # /opt/crm/stg/bin/deploy.sh and ignores anything else, so we pipe
          # the digest as the only argument that script accepts. See
          # docs/deploy/staging.md → "Locking the deploy SSH key".
          ssh -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              "${STG_USER}@${STG_HOST}" \
              "deploy ${APP_IMAGE_REF}"

      - name: smoke check /health
        env:
          STG_SMOKE_URL: ${{ secrets.STG_SMOKE_URL }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          # Retry briefly: compose `up -d` returns once containers are started,
          # but the app may still be booting. Total budget: 30s (6 * 5s).
          #
          # SIN-63146 — the gate now asserts the running commit_sha matches
          # ${EXPECTED_SHA} (the workflow_run head SHA we just baked into the
          # image). A 200 OK with the wrong SHA is treated as "old container
          # still answering while the new one comes up" — retry it. We only
          # fail red after the retry budget is exhausted with a stale SHA so
          # operators get a clear "image pull was skipped" message instead of
          # silently shipping a stale binary.
          last_seen=""
          for attempt in 1 2 3 4 5 6; do
            body="$(curl -fsS --max-time 5 "${STG_SMOKE_URL}/health" 2>/dev/null || true)"
            if [ -n "${body}" ]; then
              # jq -r prints "null" on a missing key — coalesce to empty so
              # the comparison below treats it as a non-match.
              got_sha="$(printf '%s' "${body}" | jq -r '.commit_sha // ""' 2>/dev/null || echo "")"
              last_seen="${got_sha}"
              if [ "${got_sha}" = "${EXPECTED_SHA}" ]; then
                echo "smoke check OK on attempt ${attempt} — commit_sha=${got_sha}"
                exit 0
              fi
              echo "smoke check attempt ${attempt}: /health returned commit_sha=${got_sha:-<missing>}, want ${EXPECTED_SHA} — retrying"
            else
              echo "smoke check attempt ${attempt}: no response from /health — retrying"
            fi
            sleep 5
          done
          echo "smoke check FAILED — container running commit ${last_seen:-<unreachable>}, expected ${EXPECTED_SHA} (image stale or compose pull skipped)"
          echo "Manual rollback required — see docs/deploy/staging.md"
          exit 1

      # SIN-63348 — preflight: detect stale VPS wrapper before migrate-up.
      #
      # The migrate-up step below SSHes the `migrate-up <image-ref>` verb to
      # /opt/crm/stg/bin/deploy.sh. That verb only exists in stg-deploy.sh
      # versions shipped after SIN-63332. If a human operator has not
      # re-installed the wrapper on the VPS since then (the in-repo
      # deploy/scripts/stg-deploy.sh does NOT auto-sync — see
      # docs/deploy/staging.md §4), the old wrapper rejects the verb with
      # `stg-deploy: usage: deploy <image-ref>` exit 64. SIN-63347 caught
      # this on the merge that should have run the SIN-63332 step end-to-end
      # (cd-stg run 26334123677 / job 77524925091). The cryptic usage line
      # made the failure look like a workflow bug instead of a VPS-side
      # staleness.
      #
      # The preflight invokes the wrapper with empty argv (no
      # SSH_ORIGINAL_COMMAND, no positional args). The wrapper hits its
      # usage-check branch and prints its current usage line to stderr,
      # then exits 64. We grep stdout+stderr for the canonical label
      # `migrate-up` — present in the SIN-63332+ wrapper, absent in the
      # legacy `deploy <image-ref>` wrapper. The wrapper's non-zero exit
      # is EXPECTED and ignored; the grep verdict is the gate.
      #
      # Authentication / surface area: same SSH key and same
      # `command="/opt/crm/stg/bin/deploy.sh"` authorized_keys lockdown as
      # the deploy and migrate-up steps. No new SSH key, no unrestricted
      # shell path. Option C from SIN-63347 (second SSH key) was explicitly
      # rejected; Option B (wrapper self-update verb) is deferred as a
      # future TODO.
      - name: preflight wrapper supports migrate-up
        timeout-minutes: 1
        env:
          STG_HOST: ${{ secrets.STG_HOST }}
          STG_USER: ${{ secrets.STG_USER }}
        run: |
          set -uo pipefail
          # The wrapper exits 64 on empty argv (usage branch). We capture
          # stdout+stderr and inspect content, NOT the exit code.
          output="$(ssh -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              "${STG_USER}@${STG_HOST}" </dev/null 2>&1 || true)"
          if printf '%s\n' "${output}" | grep -q 'migrate-up'; then
            echo "preflight OK — /opt/crm/stg/bin/deploy.sh supports migrate-up"
            exit 0
          fi
          # Wrapper is stale. Emit an actionable error that names exactly
          # what is wrong, what the expected wrapper looks like, what was
          # observed, and the operator remediation — see staging.md §4.
          echo "::error::VPS wrapper /opt/crm/stg/bin/deploy.sh is STALE — missing the migrate-up verb (SIN-63332)."
          {
            echo "stale-component: /opt/crm/stg/bin/deploy.sh on ${STG_HOST}"
            echo "expected:        a usage line that mentions 'migrate-up' (SIN-63332+ wrapper)"
            echo "observed:        ${output:-<empty>}"
            echo
            echo "remediation (operator, see docs/deploy/staging.md §4):"
            echo "  # From a workstation with the crm repo cloned at \`main\`:"
            echo "  scp deploy/scripts/stg-deploy.sh root@${STG_HOST}:/tmp/"
            echo "  # Then on the VPS as root:"
            echo "  sudo install -o root -g crm-deploy -m 0750 \\"
            echo "    /tmp/stg-deploy.sh /opt/crm/stg/bin/deploy.sh"
            echo "  # Re-run this workflow once the wrapper is in place."
          } >&2
          exit 1

      # SIN-63332 — migrate-up gate. PR #104 (Fase 5+6) shipped new tables
      # and columns; the tier-2 deploy from fork → pericles-luz/crm does
      # NOT auto-run migrate up against crm-stg-postgres-1, so the new
      # schema was missing on staging until an operator SSHed in to apply
      # it. The SIN-63270 /login smoke caught the resulting 500 *after*
      # the fact; this step PREVENTS it by applying migrations between
      # /health pod-ready and the login smoke.
      #
      # Implementation: SSHes the `migrate-up <image-ref>` verb on
      # stg-deploy.sh (deploy/scripts/stg-deploy.sh). That verb extracts
      # /migrations from the just-deployed image via `docker cp`, runs a
      # one-shot migrate/migrate:v4.17.1 sidecar pinned by manifest-list
      # digest inside the staging compose network, and exits 0 on
      # success. golang-migrate is idempotent — re-running against an
      # already-migrated DB is a no-op.
      #
      # Credentials: POSTGRES_USER/PASSWORD/DB are read from
      # /opt/crm/stg/.env.stg on the VPS, NOT inlined here. The runner
      # never sees plaintext DB credentials — the existing
      # authorized_keys command="…" constraint is the only thing the
      # runner can invoke over SSH, and the script enforces a strict
      # ghcr.io/pericles-luz/crm@sha256:<64hex> image-ref regex before
      # touching the DB.
      #
      # Failure mode: a missing migration or a SQL error makes
      # `migrate ... up` exit non-zero; SSH propagates that exit code;
      # the workflow turns red and the /login smoke below is skipped.
      # 60s timeout (AC #4 of SIN-63332) absorbs migrate-image cold pulls
      # while staying well under the job-level 8 min budget.
      - name: migrate-up
        timeout-minutes: 1
        env:
          STG_HOST: ${{ secrets.STG_HOST }}
          STG_USER: ${{ secrets.STG_USER }}
          APP_IMAGE_REF: ${{ steps.compose-ref.outputs.ref }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              "${STG_USER}@${STG_HOST}" \
              "migrate-up ${APP_IMAGE_REF}"

      # SIN-63270 — login smoke gate. PR #104 shipped a panic-on-valid-creds
      # regression (F10) that /health did not catch because /health never
      # touches IAM. This step drives the same three-case matrix that
      # internal/adapter/db/postgres/login_seed_e2e_test.go covers — valid
      # creds → 302 + __Host-sess-tenant + __Host-csrf + Location
      # /hello-tenant; wrong password → 401; unknown email → 401 — against
      # the just-deployed image, so the deploy fails red on the next F10.
      # Budget ≤ 30s end-to-end so a hung handler cannot wedge the job.
      - name: smoke check /login
        timeout-minutes: 1
        env:
          STG_BASE: ${{ secrets.STG_SMOKE_URL }}
          STG_SEED_AGENT_EMAIL: ${{ secrets.STG_SEED_AGENT_EMAIL }}
          STG_SEED_AGENT_PASSWORD: ${{ secrets.STG_SEED_AGENT_PASSWORD }}
        run: |
          set -euo pipefail
          # Defence-in-depth against accidental `set -x` upstream — GitHub
          # masks secret values in logs, but we do not want the password
          # bytes echoed at all.
          set +x
          smoke_run() {
            local code

            # 1) Valid creds → 302 with __Host-sess-tenant + __Host-csrf
            #    cookies and Location: /hello-tenant. This is the case
            #    that exploded with 500 on staging after PR #104.
            code=$(curl -sS --max-time 5 -o /tmp/login.body -D /tmp/login.headers \
              -w "%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "email=${STG_SEED_AGENT_EMAIL}" \
              --data-urlencode "password=${STG_SEED_AGENT_PASSWORD}" \
              "${STG_BASE}/login")
            if [ "$code" != "302" ]; then
              echo "::error::login expected 302, got $code"
              cat /tmp/login.body
              return 1
            fi
            # Staging serves HTTP/2 (lowercase header names per RFC 7540 §8.1.2).
            # Match Set-Cookie case-insensitively, matching the Location grep below.
            if ! grep -qi "Set-Cookie: __Host-sess-tenant" /tmp/login.headers; then
              echo "::error::missing __Host-sess-tenant cookie"
              cat /tmp/login.headers
              return 1
            fi
            if ! grep -qi "Set-Cookie: __Host-csrf" /tmp/login.headers; then
              echo "::error::missing __Host-csrf cookie"
              cat /tmp/login.headers
              return 1
            fi
            if ! grep -qi "^Location: /hello-tenant" /tmp/login.headers; then
              echo "::error::missing/wrong Location header"
              cat /tmp/login.headers
              return 1
            fi

            # 2) Wrong password → 401 (regression guard for the
            #    invalid-credentials branch).
            code=$(curl -sS --max-time 5 -o /dev/null -w "%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "email=${STG_SEED_AGENT_EMAIL}" \
              --data-urlencode "password=definitely-not-the-password" \
              "${STG_BASE}/login")
            if [ "$code" != "401" ]; then
              echo "::error::bad-password expected 401, got $code"
              return 1
            fi

            # 3) Unknown user → 401 (regression guard against user
            #    enumeration via a divergent error path).
            code=$(curl -sS --max-time 5 -o /dev/null -w "%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "email=does-not-exist@acme.crm.crm.someu.com.br" \
              --data-urlencode "password=anything" \
              "${STG_BASE}/login")
            if [ "$code" != "401" ]; then
              echo "::error::unknown-user expected 401, got $code"
              return 1
            fi

            # 4) SIN-63294 — GET /login must reference the baseline auth
            #    stylesheet. PR #244/#245 fixed the CSP-nonce on the
            #    tenant-theme <style>, but the layout still shipped no
            #    <link rel="stylesheet">, so the page rendered with
            #    user-agent defaults ("tela sem formatação"). This grep
            #    fails red if a future refactor strips the link tag from
            #    internal/adapter/httpapi/views/layout.html.
            code=$(curl -sS --max-time 5 -o /tmp/login.html -w "%{http_code}" \
              "${STG_BASE}/login")
            if [ "$code" != "200" ]; then
              echo "::error::GET /login expected 200, got $code"
              return 1
            fi
            if ! grep -qF '<link rel="stylesheet" href="/static/css/auth.css"' /tmp/login.html; then
              echo "::error::SIN-63294 regression — /login HTML missing /static/css/auth.css link tag"
              cat /tmp/login.html
              return 1
            fi

            # 5) SIN-63294 — the referenced stylesheet must actually be
            #    served as text/css. A missing file would 404 silently
            #    in the browser and reproduce the same unstyled-page
            #    bug. Status + content-type are both pinned.
            code=$(curl -sS --max-time 5 -o /tmp/auth.css -D /tmp/auth.headers \
              -w "%{http_code}" "${STG_BASE}/static/css/auth.css")
            if [ "$code" != "200" ]; then
              echo "::error::GET /static/css/auth.css expected 200, got $code"
              cat /tmp/auth.headers
              return 1
            fi
            if ! grep -qi "^Content-Type: text/css" /tmp/auth.headers; then
              echo "::error::auth.css served with wrong Content-Type (expected text/css)"
              cat /tmp/auth.headers
              return 1
            fi
          }

          # Up to 3 attempts with 5s backoff between attempts. The /health
          # gate above already absorbed pod-warmup, but the IAM path can
          # take an extra second to warm the prepared-statement cache on
          # the first request — three tries cover that without hiding a
          # genuine regression.
          for attempt in 1 2 3; do
            if smoke_run; then
              echo "login smoke OK on attempt ${attempt}"
              exit 0
            fi
            echo "login smoke attempt ${attempt} failed, retrying…"
            sleep 5
          done
          echo "login smoke FAILED — deploy regression (see docs/deploy/staging.md → \"Login smoke gate\")"
          exit 1

      # SIN-63858 — inbox smoke gate. The /login smoke above only proves
      # the IAM cookie contract; it does not exercise /inbox or the
      # authorizer for ActionTenantInboxRead, so the SIN-63821 W6 deploy
      # closed green while staging operators 403'd on /inbox. This step
      # wires the existing scripts/ci/stg-smoke-inbox.sh into the deploy
      # gate so a future seed/authorizer drift fails the job red instead
      # of leaking to production. Reuses the same STG_SEED_AGENT_*
      # secrets as the /login smoke — no new secrets required.
      - name: smoke check /inbox
        timeout-minutes: 1
        env:
          STG_BASE: ${{ secrets.STG_SMOKE_URL }}
          STG_SEED_AGENT_EMAIL: ${{ secrets.STG_SEED_AGENT_EMAIL }}
          STG_SEED_AGENT_PASSWORD: ${{ secrets.STG_SEED_AGENT_PASSWORD }}
          POLL_TIMEOUT_SECONDS: "30"
          POLL_INTERVAL_SECONDS: "2"
        run: |
          set -euo pipefail
          set +x
          bash scripts/ci/stg-smoke-inbox.sh
