# CI for the multi-tenant CRM — SIN-62192 Fase 0 / SIN-62210 (PR 8/12).
#
# Four jobs gate every push to main and every PR:
#   - lint           go vet + staticcheck + gofmt + the SIN-62232 notenant analyzer
#   - test           go test -race -coverprofile=cov.out against postgres/redis/nats
#   - coverage-gate  scripts/coverage-check.sh — fail if total stmt coverage < 85 %
#   - build          go build ./cmd/server
#
# No secrets are required for any job. Secrets land in PR9 (CD stg) only — if a
# job here ever references a secret it should fail by design.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true
      - name: gofmt -l .
        run: gofmt -l . | tee /dev/stderr | (! read)
      - name: go vet ./...
        run: go vet ./...
      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - name: staticcheck ./...
        run: "$(go env GOPATH)/bin/staticcheck ./..."
      - name: build notenant analyzer (SIN-62232 / ADR 0071)
        run: go build -o bin/notenant ./tools/lint/notenant/cmd/notenant
      - name: notenant analyzer (./internal/...)
        run: go vet -vettool=$(pwd)/bin/notenant ./internal/...
      - name: notenant analyzer self-test
        run: go test ./tools/lint/notenant/... -count=1
      - name: build forbidimport analyzer (SIN-62216)
        run: go build -o bin/forbidimport ./tools/lint/forbidimport/cmd/forbidimport
      - name: forbidimport analyzer (./internal/...)
        run: go vet -vettool=$(pwd)/bin/forbidimport ./internal/...
      - name: forbidimport analyzer self-test
        run: go test ./tools/lint/forbidimport/... -count=1

  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-superuser
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "wget -q -O - http://localhost:8222/healthz"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # testpg attaches to this DSN instead of spawning its own pg_ctl cluster.
      TEST_DATABASE_URL: "host=127.0.0.1 port=5432 user=postgres password=ci-superuser dbname=postgres sslmode=disable"
      TEST_REDIS_URL: "redis://127.0.0.1:6379/0"
      TEST_NATS_URL: "nats://127.0.0.1:4222"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true
      - name: go test -race -coverprofile=cov.out ./...
        run: go test -race -count=1 -coverprofile=cov.out ./...
      - name: upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: cov.out
          path: cov.out
          if-no-files-found: error
          retention-days: 7

  coverage-gate:
    name: coverage-gate
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true
      - name: download coverage profile
        uses: actions/download-artifact@v4
        with:
          name: cov.out
      - name: enforce >=85% total coverage
        run: scripts/coverage-check.sh cov.out 60

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true
      - name: go build ./cmd/server
        run: go build ./cmd/server
