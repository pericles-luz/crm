# Webhook integration tests — SIN-62277.
#
# Runs the integration suite against a real Postgres 16 service container,
# exercising migrations 0075a..0075d (up/down/up cycle, partition rotation,
# token-rotation overlap, cross-tenant idempotency segmentation, body↔
# tenant misroute detection — see internal/webhook/integration/).
#
# The unit suite already runs in `ci.yml` (SIN-62232); this job is gated
# by the `integration` build tag so it never gets pulled into the fast
# default `go test ./...` path.

name: webhook-integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  webhook-integration:
    name: webhook integration (Postgres real)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: crmtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d crmtest"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Harness in internal/webhook/integration/harness_test.go reads
      # TEST_POSTGRES_DSN first; testcontainers is the local-dev fallback.
      TEST_POSTGRES_DSN: "postgres://crm:crm@127.0.0.1:5432/crmtest?sslmode=disable"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.26.3'
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet (integration build tag)
        run: |
          go vet -tags integration ./internal/webhook/integration/...
          go vet -tags integration ./internal/adapter/channels/whatsapp/...
          go vet -tags integration ./internal/adapter/channels/instagram/...

      - name: integration suite + combined coverage gate (>=85%)
        run: make test-integration-cover

      # SIN-62846 F2-09.3: the per-channel adapter packages own their own
      # E2E integration tests (HMAC -> dedup -> use case -> Postgres). They
      # share the harness in internal/adapter/channels/channeltest/ and read
      # the same TEST_POSTGRES_DSN as the webhook stack. -coverpkg covers
      # both the adapter under test and the shared harness so the channeltest
      # statements show up against a real run (rather than reporting 0% when
      # the package is measured in isolation).
      - name: channel adapter integration suite
        run: |
          go test -tags integration -count=1 -timeout 300s -p 1 \
            -coverpkg=./internal/adapter/channels/whatsapp,./internal/adapter/channels/instagram,./internal/adapter/channels/channeltest \
            -coverprofile=coverage.channels.itest.out \
            ./internal/adapter/channels/whatsapp/... \
            ./internal/adapter/channels/instagram/...

      - name: upload channel adapter coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: channel-adapter-integration-coverage
          path: coverage.channels.itest.out
          if-no-files-found: ignore

      - name: upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: webhook-integration-coverage
          path: |
            coverage.unit.out
            coverage.itest.out
            coverage.combined.out
          if-no-files-found: ignore
