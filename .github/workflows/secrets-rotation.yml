# Secrets-rotation CI gate (SIN-63189 / Fase 6 PR7).
#
# Runs shellcheck + the pure-bash unit tests for the rotation scripts
# on every PR that touches them, and on push to main. The scripts
# themselves never run their DB / docker side-effects in CI — the
# library-mode tests cover the helpers, and the runbook in
# docs/ops/secrets-rotation.md covers the side-effecting cycle.

name: secrets-rotation

on:
  pull_request:
    paths:
      - "scripts/rotate-secret.sh"
      - "scripts/rotate-secret.test.sh"
      - "scripts/update-config-and-redeploy.sh"
      - "scripts/update-config-and-redeploy.test.sh"
      - "docs/ops/secrets-rotation.md"
      - "docs/ops/secret-rotation-schedule.md"
      - ".github/workflows/secrets-rotation.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # SHA-pinned per repo convention (SIN-62303): a tag re-publish on a
      # third-party action would otherwise smuggle workflow code into CI.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: install prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck openssl
          shellcheck --version
          openssl version

      - name: shellcheck rotation scripts
        # `-x` lets shellcheck follow the `# shellcheck source=...`
        # directives in the *.test.sh files, so SC1090/SC1091 do not
        # fire for the deliberate `source "$SCRIPT"` calls.
        run: |
          shellcheck -x \
            scripts/rotate-secret.sh \
            scripts/rotate-secret.test.sh \
            scripts/update-config-and-redeploy.sh \
            scripts/update-config-and-redeploy.test.sh

      - name: rotate-secret pure-bash unit tests
        run: bash scripts/rotate-secret.test.sh

      - name: update-config pure-bash unit tests
        run: bash scripts/update-config-and-redeploy.test.sh
