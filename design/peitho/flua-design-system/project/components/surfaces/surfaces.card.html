<!-- @dsCard group="Components" viewport="700x250" name="Card, Tabs & Tooltip" subtitle="Surface container, underline tabs, hover tooltip" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:20px;background:var(--bg-app)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Card, Tabs, Tooltip, IconButton, Badge } = window.FluaDesignSystem_2587b4;
function Demo(){
  return (<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'start'}}>
    <Card padding={16}>
      <Tabs items={[{value:"all",label:"Todos",count:128},{value:"mine",label:"Meus",count:14},{value:"won",label:"Ganhos",icon:"check"}]} defaultValue="all"/>
      <p style={{marginTop:14,fontSize:'var(--text-sm)',color:'var(--text-secondary)'}}>
        Conteúdo do painel. Cards usam borda + sombra suave, sem elevação pesada.
      </p>
    </Card>
    <Card padding={16} interactive>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <strong style={{fontSize:'var(--text-md)'}}>Card interativo</strong>
        <Badge tone="accent" icon="zap">IA</Badge>
      </div>
      <p style={{margin:'8px 0 14px',fontSize:'var(--text-sm)',color:'var(--text-secondary)'}}>Passe o mouse — a sombra se eleva sutilmente.</p>
      <div style={{display:'flex',gap:6}}>
        <Tooltip label="Ligar" side="top"><IconButton icon="phone" variant="outline" label="Ligar"/></Tooltip>
        <Tooltip label="Enviar e-mail" side="top"><IconButton icon="mail" variant="outline" label="E-mail"/></Tooltip>
        <Tooltip label="Agendar" side="top"><IconButton icon="calendar" variant="outline" label="Agendar"/></Tooltip>
      </div>
    </Card>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
