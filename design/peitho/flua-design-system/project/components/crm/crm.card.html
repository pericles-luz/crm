<!-- @dsCard group="Components" viewport="700x470" name="CRM — Lead Card, Funnel & ⌘K" subtitle="The five signature CRM components" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:20px;background:var(--bg-app)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { LeadCard, FunnelRow, Card, Button, CommandBar } = window.FluaDesignSystem_2587b4;
function Demo(){
  const [open,setOpen] = React.useState(false);
  React.useEffect(()=>{
    const h=(e)=>{ if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();setOpen(true);} };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[]);
  const groups=[
    {label:"Ações rápidas",items:[
      {label:"Novo lead",icon:"plus",shortcut:["⌘","N"]},
      {label:"Registrar atividade",icon:"calendar"},
      {label:"Resumir conversa com IA",icon:"sparkles",hint:"Beta"},
    ]},
    {label:"Navegar",items:[
      {label:"Ir para Funil de vendas",icon:"git-branch"},
      {label:"Ir para Inbox",icon:"inbox",hint:"3 não lidas"},
    ]},
  ];
  return (<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <span style={{fontSize:'var(--text-sm)',color:'var(--text-secondary)'}}>Pressione <b>⌘K</b> ou clique →</span>
      <Button variant="secondary" size="sm" leftIcon="search" onClick={()=>setOpen(true)}>Comandos ⌘K</Button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
      <LeadCard lead={{name:"Marina Costa",company:"Northwind Tecnologia",status:"negotiating",value:"R$ 24.500",owner:"Rafael",lastActivity:"há 2h",tags:["Enterprise","Inbound"]}}/>
      <LeadCard lead={{name:"Eduardo Pires",company:"Lumina Varejo",status:"won",value:"R$ 88.000",owner:"Júlia",lastActivity:"ontem",tags:["Renovação"]}}/>
    </div>
    <Card padding={0}>
      <div style={{display:'grid',gridTemplateColumns:'1.6fr 1.4fr 0.9fr 36px',gap:16,padding:'9px 16px',borderBottom:'1px solid var(--border)'}}>
        {["Negócio","Estágio","Valor",""].map((h,i)=>(<span key={i} className="eyebrow" style={{textAlign:i===2?'right':'left'}}>{h}</span>))}
      </div>
      <FunnelRow deal={{name:"Implantação CRM",company:"Acme Logística",value:"R$ 42.000",owner:"Bruno",stageIndex:1}}/>
      <FunnelRow deal={{name:"Renovação anual",company:"Vértice Saúde",value:"R$ 120.000",owner:"Carla",stageIndex:2}}/>
      <FunnelRow deal={{name:"Upsell módulo IA",company:"Onda Digital",value:"R$ 18.900",owner:"Diego",stageIndex:3}}/>
    </Card>
    <CommandBar open={open} onClose={()=>setOpen(false)} groups={groups}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
