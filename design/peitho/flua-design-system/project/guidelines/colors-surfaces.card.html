<!-- @dsCard group="Colors" viewport="700x180" name="Light & Dark surfaces" subtitle="Semantic surface + text tokens, both themes side by side" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:#e9eaee;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pane{border-radius:var(--radius-lg);padding:14px;background:var(--bg-app);border:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;box-shadow:var(--shadow-sm)}
.t1{color:var(--text-primary);font-size:14px;font-weight:600}
.t2{color:var(--text-secondary);font-size:13px;margin-top:2px}
.t3{color:var(--text-tertiary);font-size:12px;margin-top:2px}
.tag{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary)}
.acc{display:inline-block;margin-top:8px;padding:5px 10px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:12px;font-weight:500}</style></head>
<body>
<div class="pane"><span class="tag">Light · #F4F5F7</span><div class="card" style="margin-top:6px"><div class="t1">Texto primário</div><div class="t2">Texto secundário</div><div class="t3">Texto terciário</div><span class="acc">Ação</span></div></div>
<div class="pane" data-theme="dark"><span class="tag">Dark · #0F1117</span><div class="card" style="margin-top:6px"><div class="t1">Texto primário</div><div class="t2">Texto secundário</div><div class="t3">Texto terciário</div><span class="acc">Ação</span></div></div>
</body></html>
