<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="Strict 4px grid — density-medium" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:14px;margin-bottom:7px}
.bar{height:14px;background:var(--accent);border-radius:2px}
.n{width:90px;font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}</style></head>
<body id="b">
<script>
const steps=[["1",4],["2",8],["3",12],["4",16],["6",24],["8",32],["12",48],["16",64]];
document.getElementById('b').innerHTML=steps.map(([n,px])=>`<div class="row"><span class="n">space-${n} · ${px}px</span><span class="bar" style="width:${px}px"></span></div>`).join('');
</script>
</body></html>
