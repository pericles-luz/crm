<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:4px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px;border-radius:var(--radius-md);color:var(--text-secondary)}
.cell:hover{background:var(--surface);color:var(--accent)}
.cap{font-size:9px;color:var(--text-tertiary)}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, ICON_PATHS } = window.FluaDesignSystem_2587b4;
const names = Object.keys(ICON_PATHS);
function Demo(){
  return (<div className="grid">
    {names.map(n=>(<div className="cell" key={n}><Icon name={n} size={20}/><span className="cap">{n}</span></div>))}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
