<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Compact scale — 14px base, 12px labels, 20px+ titles" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-sans)}
.row{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-subtle)}
.spec{width:130px;flex-shrink:0;font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
.t{color:var(--text-primary)}</style></head>
<body>
<div class="row"><span class="spec">30px / 700</span><span class="t" style="font-size:30px;font-weight:700;letter-spacing:-.02em">R$ 1.2M em pipeline</span></div>
<div class="row"><span class="spec">24px / 600</span><span class="t" style="font-size:24px;font-weight:600;letter-spacing:-.01em">Funil de vendas</span></div>
<div class="row"><span class="spec">20px / 600</span><span class="t" style="font-size:20px;font-weight:600">Título de página</span></div>
<div class="row"><span class="spec">16px / 600</span><span class="t" style="font-size:16px;font-weight:600">Título de card</span></div>
<div class="row"><span class="spec">14px / 400</span><span class="t" style="font-size:14px">Texto base da interface — leitura densa e confortável.</span></div>
<div class="row"><span class="spec">13px / 400</span><span class="t" style="font-size:13px;color:var(--text-secondary)">Texto secundário em tabelas e listas.</span></div>
<div class="row"><span class="spec">12px / 500</span><span class="t" style="font-size:12px;font-weight:500;color:var(--text-secondary)">Rótulo de campo</span></div>
<div class="row"><span class="spec">11px / 600 · caps</span><span class="t" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary)">Eyebrow / seção</span></div>
</body></html>
