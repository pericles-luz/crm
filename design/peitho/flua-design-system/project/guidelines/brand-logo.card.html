<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr}
.pane{display:flex;flex-direction:column;gap:18px;align-items:center;justify-content:center;padding:28px}
.light{background:var(--gray-50)}.dark{background:#0F1117}
.row{display:flex;gap:14px;align-items:center}
.cap{font-size:10px;text-transform:uppercase;letter-spacing:.04em}</style></head>
<body>
<div class="pane light"><img src="../assets/peitho-logo-light.svg" width="187" height="42">
<div class="row"><img src="../assets/peitho-icon.svg" width="48" height="48"><img src="../assets/peitho-icon.svg" width="32" height="32"><img src="../assets/peitho-icon.svg" width="20" height="20"><img src="../assets/peitho-icon.svg" width="16" height="16"></div>
<span class="cap" style="color:var(--text-tertiary)">Fundo claro</span></div>
<div class="pane dark"><img src="../assets/peitho-logo-dark.svg" width="187" height="42">
<div class="row"><img src="../assets/peitho-icon.svg" width="48" height="48"><img src="../assets/peitho-icon.svg" width="32" height="32"><img src="../assets/peitho-icon.svg" width="20" height="20"><img src="../assets/peitho-icon.svg" width="16" height="16"></div>
<span class="cap" style="color:#6B7280">Fundo escuro</span></div>
</body></html>
