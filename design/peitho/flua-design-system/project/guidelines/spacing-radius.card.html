<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & elevation" subtitle="Restrained radii, soft low-opacity shadows" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-sans);display:flex;gap:28px;flex-wrap:wrap}
.group{display:flex;gap:12px}
.box{width:64px;height:64px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.sh{width:74px;height:64px;background:var(--surface);border-radius:var(--radius-lg);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-size:10px;color:var(--text-tertiary)}</style></head>
<body>
<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary);font-weight:600;margin-bottom:10px">Radius</div>
<div class="group">
<div class="box" style="border-radius:var(--radius-sm)">sm·5</div>
<div class="box" style="border-radius:var(--radius-md)">md·7</div>
<div class="box" style="border-radius:var(--radius-lg)">lg·10</div>
<div class="box" style="border-radius:var(--radius-xl)">xl·14</div>
</div></div>
<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary);font-weight:600;margin-bottom:10px">Elevation</div>
<div class="group">
<div class="sh" style="box-shadow:var(--shadow-sm)">sm</div>
<div class="sh" style="box-shadow:var(--shadow-md)">md</div>
<div class="sh" style="box-shadow:var(--shadow-lg)">lg</div>
<div class="sh" style="box-shadow:var(--shadow-xl)">xl</div>
</div></div>
</body></html>
