{{define "login.html"}}<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow">
  <title>Console master — Sindireceita</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 24rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
    label { display: block; font-weight: 600; margin-top: 1rem; }
    input { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; border: 1px solid #888; border-radius: 4px; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid #2962ff; background: #2962ff; color: white; cursor: pointer; font-size: 1rem; }
    .error { background: #fdecea; border-left: 4px solid #d32f2f; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Console master</h1>
  {{if .ErrorMessage}}<div class="error" role="alert" data-testid="login-error">{{.ErrorMessage}}</div>{{end}}
  <form method="POST" action="/m/login{{if .NextPath}}?next={{.NextPath}}{{end}}" autocomplete="off">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" autofocus required>
    <label for="password">Senha</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
{{end}}
