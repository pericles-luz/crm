{{define "row"}}
<tr id="domain-row-{{.ID}}"
    {{if eq .StatusName "pending"}}hx-get="/tenant/custom-domains/{{.ID}}/status"
    hx-trigger="every 30s"
    hx-target="this"
    hx-swap="outerHTML"{{end}}>
  <td><code>{{.Host}}</code></td>
  <td>
    <span class="status-badge status-{{.BadgeColor}}"
          title="{{.StatusTooltip}}"
          aria-label="Status: {{.StatusLabel}}">
      {{.StatusLabel}}
    </span>
    {{if .VerifiedWithDNSSEC}}<span class="dnssec-flag" title="Verificado com DNSSEC">🔒 DNSSEC</span>{{end}}
  </td>
  <td>{{if .VerifiedAtFmt}}{{.VerifiedAtFmt}}{{else}}—{{end}}</td>
  <td>{{.CreatedAtFmt}}</td>
  <td class="actions">
    {{if eq .StatusName "pending"}}
      <button type="button"
              class="btn btn-sm"
              aria-label="Mostrar instruções de DNS para {{.Host}}"
              hx-get="/tenant/custom-domains/{{.ID}}/instructions"
              hx-target="#wizard"
              hx-swap="innerHTML">
        Instruções DNS
      </button>
      <button type="button"
              class="btn btn-sm btn-primary"
              aria-label="Verificar agora o domínio {{.Host}}"
              hx-post="/api/customdomains/{{.ID}}/verify"
              hx-headers='{"X-CSRF-Token": "{{.CSRFToken}}"}'
              hx-target="#domain-row-{{.ID}}"
              hx-swap="outerHTML">
        Verificar agora
      </button>
    {{end}}
    {{if eq .StatusName "verified"}}
      <button type="button"
              class="btn btn-sm"
              aria-label="Pausar TLS para {{.Host}}"
              hx-patch="/api/customdomains/{{.ID}}?paused=true"
              hx-headers='{"X-CSRF-Token": "{{.CSRFToken}}"}'
              hx-target="#domain-row-{{.ID}}"
              hx-swap="outerHTML"
              hx-confirm="Pausar TLS para {{.Host}}? Isto interrompe novos certificados.">
        Pausar TLS
      </button>
    {{end}}
    {{if eq .StatusName "paused"}}
      <button type="button"
              class="btn btn-sm"
              aria-label="Retomar TLS para {{.Host}}"
              hx-patch="/api/customdomains/{{.ID}}?paused=false"
              hx-headers='{"X-CSRF-Token": "{{.CSRFToken}}"}'
              hx-target="#domain-row-{{.ID}}"
              hx-swap="outerHTML">
        Retomar TLS
      </button>
    {{end}}
    <button type="button"
            class="btn btn-sm btn-danger"
            aria-label="Excluir o domínio {{.Host}}"
            hx-get="/tenant/custom-domains/{{.ID}}/delete"
            hx-target="#wizard"
            hx-swap="innerHTML">
      Excluir
    </button>
  </td>
</tr>
{{end}}
